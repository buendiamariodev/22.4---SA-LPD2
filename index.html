<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversor de Temperatura</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: #1a1a1a;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #888;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
    }

    input[type="number"] {
      flex: 1;
      padding: 10px 14px;
      font-size: 1.1rem;
      border: 1px solid #ddd;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus { border-color: #3a7bd5; }

    button {
      padding: 10px 18px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #333; }

    .error {
      font-size: 0.82rem;
      color: #c0392b;
      min-height: 20px;
      margin-bottom: 1rem;
    }

    .results {
      display: none;
      margin-top: 1rem;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1rem;
    }

    .metric-card {
      background: #f7f7f5;
      border-radius: 10px;
      padding: 1rem;
    }

    .metric-label {
      font-size: 0.78rem;
      color: #888;
      margin-bottom: 6px;
    }

    .metric-value {
      font-size: 1.8rem;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1;
    }

    .metric-unit {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 4px;
    }

    .console-box {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 1rem;
    }

    .console-label {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 8px;
      font-family: monospace;
    }

    pre {
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      color: #7ec8a4;
      white-space: pre-wrap;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Conversor de Temperatura</h1>
    <p class="subtitle">Celsius → Fahrenheit y Kelvin</p>

    <label for="tempInput">Temperatura en Celsius</label>
    <div class="input-row">
      <input type="number" id="tempInput" placeholder="ej. 45" step="any" />
      <button onclick="convertir()">Convertir</button>
    </div>
    <p class="error" id="errorMsg"></p>

    <div class="results" id="results">
      <div class="cards-grid">
        <div class="metric-card">
          <p class="metric-label">Fahrenheit</p>
          <p class="metric-value" id="fahrenheitVal">—</p>
          <p class="metric-unit">°F</p>
        </div>
        <div class="metric-card">
          <p class="metric-label">Kelvin</p>
          <p class="metric-value" id="kelvinVal">—</p>
          <p class="metric-unit">K</p>
        </div>
      </div>

      <div class="console-box">
        <p class="console-label">// consola</p>
        <pre id="consoleLog"></pre>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
